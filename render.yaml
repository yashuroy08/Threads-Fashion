services:
  # Backend Service (Spring Boot)
  - type: web
    name: threads-fashion-backend
    env: docker
    plan: free
    dockerContext: backend-spring
    dockerfilePath: Dockerfile
    envVars:
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB
        value: threads-fashion
      - key: JWT_SECRET 
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: FRONTEND_URL
        value: https://threads-fashion.vercel.app
      - key: PORT
        value: 8081
